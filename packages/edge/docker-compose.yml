# Baryon Edge — network-isolated, read-only agent sandbox.
#
# Guarantee: the `agent` has NO general internet. It sits on an `internal`
# network (no default route) together with Postgres + MinIO, and its ONLY path
# off-box is `egress-proxy`, which allowlists exactly one host: the LLM gateway.
# So the agent can READ db/object-store and call the LLM — and nothing else
# (no arbitrary HTTP, no exfiltration).
#
# For a fully air-gapped site (internal vLLM): drop egress-proxy and point the
# gateway at the internal LLM on the `internal` network — then there is zero
# outbound at all.
services:
  agent:
    build: .
    environment:
      # Read-only data plane (point PG at a SELECT-only role on a replica).
      EDGE_PG_URL: "postgres://readonly:${PG_PASSWORD}@postgres:5432/app?sslmode=disable"
      EDGE_S3_ENDPOINT: "http://minio:9000"
      EDGE_S3_BUCKET: "${S3_BUCKET:-lots}"
      EDGE_S3_PREFIX: "${S3_PREFIX:-}"
      EDGE_S3_ACCESS_KEY: "${S3_ACCESS_KEY}"
      EDGE_S3_SECRET_KEY: "${S3_SECRET_KEY}"
      BARYON_API_KEY: "${BARYON_API_KEY}"
      # Force ALL outbound through the allowlist proxy.
      HTTP_PROXY: "http://egress-proxy:3128"
      HTTPS_PROXY: "http://egress-proxy:3128"
      NO_PROXY: "postgres,minio,localhost,127.0.0.1"
    networks: [internal]
    depends_on: [postgres, minio, egress-proxy]
    stdin_open: true
    tty: true

  egress-proxy:
    image: ubuntu/squid:latest
    volumes:
      - ./squid-allowlist.conf:/etc/squid/squid.conf:ro
    networks: [internal, external] # bridges internal → only allowlisted hosts

  postgres:
    image: postgres:17
    environment:
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
      POSTGRES_DB: app
    networks: [internal] # internal only — never exposed off-box

  minio:
    image: minio/minio:latest
    command: server /data
    environment:
      MINIO_ROOT_USER: "${S3_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${S3_SECRET_KEY}"
    networks: [internal] # internal only

networks:
  internal:
    internal: true # NO default route → no internet for attached services
  external: {}
