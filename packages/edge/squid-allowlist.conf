# Baryon Edge egress allowlist — the agent may reach ONLY the LLM gateway.
# Everything else (arbitrary internet) is denied, so internal data cannot be
# exfiltrated over HTTP. Edit `allowed_hosts` for your gateway (or an internal
# vLLM host). For a fully air-gapped site, you don't need this proxy at all.

http_port 3128

# Allowlisted destination(s): the Baryon LLM gateway only.
acl allowed_hosts dstdomain api.baryon.ai baryon-ai-api.fly.dev
acl SSL_ports port 443
acl CONNECT method CONNECT

# Permit CONNECT (TLS) only to the allowlisted hosts on 443.
http_access deny CONNECT !SSL_ports
http_access allow CONNECT allowed_hosts
http_access allow allowed_hosts
# Deny everything else.
http_access deny all

# Don't leak via DNS prefetch / keep logs minimal.
dns_v4_first on
